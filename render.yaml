services:
  - type: web
    name: supportdesk-api
    region: oregon
    plan: starter          # free tier has 512MB RAM — sentence-transformers needs ~800MB
    env: python
    rootDir: backend
    buildCommand: >
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt &&
      python rich_seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./support_tickets.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # ← update after Vercel deploy
