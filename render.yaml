services:
  - type: web
    name: supportdesk-api
    region: oregon
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python rich_seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./support_tickets.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: FRONTEND_URL
        value: https://semantic-ticket-retrieval-and-priority-prediction.vercel.app
      # ── AI / LLM ──────────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false          # Set this manually in Render dashboard (never store in git)
      - key: OPENAI_API_KEY
        sync: false          # Optional fallback — leave blank if using Groq only
      # ── ML Model ──────────────────────────────────────────────────────────────
      - key: HF_MODEL_ID
        value: somtomxr/ticket-priority-distilbert   # Loads DistilBERT (94% accuracy) from HuggingFace Hub
      # ── Vector DB ─────────────────────────────────────────────────────────────
      - key: QDRANT_URL
        value: ""            # Leave empty = in-memory Qdrant (resets on restart, fine for free tier)
